<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashen Saga — Battle Prototype</title>
  <script>
    window.__errs = [];
    window.addEventListener('error', function (e) {
      window.__errs.push(String((e && e.message) || (e && e.error) || e));
    });
    window.addEventListener('unhandledrejection', function (e) {
      window.__errs.push('promise: ' + String(e && e.reason));
    });
  </script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0a0a0f;
      color: #e8e0d0;
      font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
      height: 100%;
      overflow: hidden;
    }
    #game {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    canvas {
      image-rendering: pixelated;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <script src="vendor/phaser.min.js"></script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
